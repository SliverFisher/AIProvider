services:
  configservice:
    image: apolloconfig/apollo-configservice:2.5.2
    container_name: aiprovider-apollo-configservice
    network_mode: host
    restart: unless-stopped
    mem_limit: 420m
    environment:
      SERVER_PORT: "8081"
      SPRING_DATASOURCE_URL: "jdbc:mysql://127.0.0.1:3306/ApolloConfigDB?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai"
      SPRING_DATASOURCE_USERNAME: "apollo"
      SPRING_DATASOURCE_PASSWORD: "${APOLLO_DB_PASSWORD}"
      EUREKA_INSTANCE_IP_ADDRESS: "127.0.0.1"
      EUREKA_SERVICE_URL_DEFAULTZONE: "http://127.0.0.1:8081/eureka/"
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:MaxMetaspaceSize=128m"
    logging:
      options:
        max-size: "20m"
        max-file: "3"

  adminservice:
    image: apolloconfig/apollo-adminservice:2.5.2
    container_name: aiprovider-apollo-adminservice
    network_mode: host
    restart: unless-stopped
    mem_limit: 420m
    depends_on:
      - configservice
    environment:
      SERVER_PORT: "8090"
      SPRING_DATASOURCE_URL: "jdbc:mysql://127.0.0.1:3306/ApolloConfigDB?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai"
      SPRING_DATASOURCE_USERNAME: "apollo"
      SPRING_DATASOURCE_PASSWORD: "${APOLLO_DB_PASSWORD}"
      EUREKA_INSTANCE_IP_ADDRESS: "127.0.0.1"
      EUREKA_SERVICE_URL_DEFAULTZONE: "http://127.0.0.1:8081/eureka/"
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:MaxMetaspaceSize=128m"
    logging:
      options:
        max-size: "20m"
        max-file: "3"

  portal:
    image: apolloconfig/apollo-portal:2.5.2
    container_name: aiprovider-apollo-portal
    network_mode: host
    restart: unless-stopped
    mem_limit: 420m
    depends_on:
      - configservice
      - adminservice
    environment:
      SERVER_PORT: "8070"
      SPRING_DATASOURCE_URL: "jdbc:mysql://127.0.0.1:3306/ApolloPortalDB?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai"
      SPRING_DATASOURCE_USERNAME: "apollo"
      SPRING_DATASOURCE_PASSWORD: "${APOLLO_DB_PASSWORD}"
      APOLLO_PORTAL_ENVS: "pro"
      PRO_META: "http://127.0.0.1:8081"
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:MaxMetaspaceSize=128m"
    logging:
      options:
        max-size: "20m"
        max-file: "3"
