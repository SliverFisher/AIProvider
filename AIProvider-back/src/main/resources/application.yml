server:
  port: ${SERVER_PORT:8888}
  forward-headers-strategy: framework

spring:
  application:
    name: ai-provider
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_provider?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8}
    username: ${DB_USERNAME:ai_provider}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.aiprovider.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
